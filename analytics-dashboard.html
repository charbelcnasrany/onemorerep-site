<!doctype html>
<!--
  RepCall — live analytics dashboard (first-party, no third-party SDK).
  Host this file on repcall.app (the RepCall-site / GitHub Pages repo, same place as
  the legal pages). Open it with the secret key in the URL:
      https://repcall.app/analytics-dashboard.html?key=<DASHBOARD_KEY>
  It fetches aggregate metrics (no PII) from the key-gated Supabase `dashboard`
  function and renders them, auto-refreshing every 5 minutes = "living".
  The key lives only in your bookmarked URL, never in this file.
-->
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta http-equiv="refresh" content="300" />
  <meta name="robots" content="noindex, nofollow" />
  <title>RepCall Analytics</title>
  <style>
    :root{
      --bg:#17120f; --bg2:#0f0b09; --card:#241c17; --edge:#3a2d24;
      --ink:#F5EDE6; --muted:#a8998c; --orange:#FF5A1F; --gold:#F5B301; --green:#4ade80; --red:#f87171;
    }
    *{box-sizing:border-box}
    body{margin:0;background:var(--bg);color:var(--ink);
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased}
    .wrap{max-width:960px;margin:0 auto;padding:28px 20px 64px}
    .top{display:flex;align-items:baseline;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:22px}
    .brand{font-size:22px;font-weight:900;letter-spacing:-.01em}
    .brand span{color:var(--orange)}
    .gen{font-size:12px;color:var(--muted)}
    .hero{background:linear-gradient(135deg,var(--card),#1c1512);border:1px solid var(--edge);border-radius:18px;padding:22px 24px;margin-bottom:22px}
    .hero .k{font-size:12px;letter-spacing:.06em;text-transform:uppercase;color:var(--orange);font-weight:700}
    .hero .l{font-size:14px;color:var(--muted);margin-top:2px}
    .hero .v{font-size:56px;font-weight:900;line-height:1.05;margin-top:10px}
    .hero .d{font-size:13px;margin-top:6px}
    .sec{font-size:13px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:6px 2px 12px}
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:22px}
    .card{background:var(--card);border:1px solid var(--edge);border-radius:14px;padding:16px 18px}
    .card .cl{font-size:12px;letter-spacing:.04em;text-transform:uppercase;color:var(--muted)}
    .card .cv{font-size:30px;font-weight:800;margin-top:6px}
    .card .cs{font-size:12px;margin-top:4px;color:var(--muted)}
    .panel{background:var(--card);border:1px solid var(--edge);border-radius:14px;padding:18px;margin-bottom:22px}
    .bars{display:flex;gap:8px;align-items:flex-end}
    .bar{flex:1;display:flex;flex-direction:column;align-items:center;gap:6px;min-width:0}
    .bar .bv{font-size:12px;font-weight:700}
    .bar .track{width:100%;display:flex;align-items:flex-end;height:140px}
    .bar .fill{width:100%;border-radius:6px 6px 0 0;background:linear-gradient(180deg,var(--orange),#c0440f)}
    .bar .bl{font-size:11px;color:var(--muted)}
    .bar .bx{font-size:10px;color:var(--muted);line-height:1.3;text-align:center}
    .cap{font-size:11px;color:var(--muted);margin-top:12px;text-align:center}
    .frow{margin-bottom:10px}
    .frow .fl{display:flex;justify-content:space-between;font-size:13px;margin-bottom:4px}
    .frow .fl span:last-child{color:var(--muted)}
    .frow .ft{background:var(--bg2);border-radius:8px;height:16px;overflow:hidden}
    .frow .ff{height:100%;background:linear-gradient(90deg,var(--orange),var(--gold))}
    .msg{max-width:640px;margin:80px auto;padding:24px;text-align:center;color:var(--muted)}
    .up{color:var(--green)} .down{color:var(--red)} .flat{color:var(--muted)}
  </style>
</head>
<body>
  <div id="app"><div class="msg">Loading…</div></div>
  <script>
    var FN = 'https://licuokfukjbpedyzxxao.supabase.co/functions/v1/dashboard';
    function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return{'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];});}
    function n(v){return (typeof v==='number'&&isFinite(v))?v:(Number(v)||0);}
    function pct(v){return n(v)+'%';}
    function delta(cur,prev){
      var d=cur-prev;
      if(prev===0&&cur===0) return '<span class="flat">— no change</span>';
      var cls=d>0?'up':d<0?'down':'flat', arrow=d>0?'▲':d<0?'▼':'—';
      var rel=prev>0?(' ('+(d>=0?'+':'')+Math.round(d/prev*100)+'%)'):'';
      return '<span class="'+cls+'">'+arrow+' '+(d>=0?'+':'')+d+rel+' vs last week</span>';
    }
    function card(label,value,sub){
      return '<div class="card"><div class="cl">'+esc(label)+'</div><div class="cv">'+value+'</div>'+(sub?'<div class="cs">'+sub+'</div>':'')+'</div>';
    }
    function weeklyChart(weeks){
      var max=1; weeks.forEach(function(w){max=Math.max(max,n(w.verified_checkins));});
      return '<div class="bars">'+weeks.map(function(w){
        var h=Math.max(3,Math.round(n(w.verified_checkins)/max*140));
        var lbl=esc(String(w.week_start).slice(5));
        return '<div class="bar"><div class="bv">'+n(w.verified_checkins)+'</div>'
          +'<div class="track"><div class="fill" style="height:'+h+'px" title="'+lbl+'"></div></div>'
          +'<div class="bl">'+lbl+'</div><div class="bx">'+n(w.active_users)+' act<br>'+n(w.new_users)+' new</div></div>';
      }).join('')+'</div>';
    }
    function funnel(f){
      var base=Math.max(1,n(f.signed_up));
      var steps=[['Signed up',n(f.signed_up)],['Added a friend',n(f.added_friend)],['First check-in',n(f.first_check_in)],['Activated',n(f.activated)]];
      return steps.map(function(s){
        var w=Math.round(s[1]/base*100);
        return '<div class="frow"><div class="fl"><span>'+esc(s[0])+'</span><span>'+s[1]+' · '+w+'%</span></div>'
          +'<div class="ft"><div class="ff" style="width:'+w+'%"></div></div></div>';
      }).join('');
    }
    function render(d){
      var ns=d.north_star||{},u=d.users||{},a=d.activation||{},e=d.engagement||{},r=d.retention||{};
      var gen=d.generated_at?new Date(d.generated_at).toUTCString():'—';
      return '<div class="wrap">'
        +'<div class="top"><div class="brand">Rep<span>Call</span> Analytics</div><div class="gen">generated '+esc(gen)+' · auto-refreshes every 5 min</div></div>'
        +'<div class="hero"><div class="k">North Star</div><div class="l">'+esc(ns.label||'Weekly Verified Check-ins by Connected Users')+'</div>'
        +'<div class="v">'+n(ns.this_week)+'</div><div class="d">'+delta(n(ns.this_week),n(ns.prev_week))+'</div></div>'
        +'<div class="sec">Users</div><div class="grid">'
        +card('Total users',String(n(u.total)))+card('Activated',String(n(u.activated)),pct(a.activated_pct)+' of users')
        +card('With a friend',String(n(u.with_friend)))+card('New (7d)',String(n(u.new_7d)))+card('Active (7d)',String(n(u.active_7d)))+'</div>'
        +'<div class="sec">Activation &amp; retention</div><div class="grid">'
        +card('Made a check-in',pct(a.first_checkin_pct),'of all users')+card('Activated',pct(a.activated_pct),'check-in + friend')
        +card('W1 retention',pct(r.w1_pct),'check-in in week +1')+card('W2 retention',pct(r.w2_pct),'check-in in week +2')+'</div>'
        +'<div class="sec">Engagement (last 7 days)</div><div class="grid">'
        +card('Check-ins',String(n(e.checkins_7d)),delta(n(e.checkins_7d),n(e.checkins_prev_7d)))
        +card('Verified',pct(e.verified_pct),'of check-ins')+card('With media',pct(e.with_media_pct),'of check-ins')
        +card('Reactions',String(n(e.reactions_7d)))+card('Nudges',String(n(e.nudges_7d)))+'</div>'
        +'<div class="sec">Verified check-ins by connected users — last 8 weeks</div>'
        +'<div class="panel">'+weeklyChart(Array.isArray(d.weekly)?d.weekly:[])
        +'<div class="cap">bar = verified check-ins (WVCC) · act = active users · new = signups · week starting (MM-DD)</div></div>'
        +'<div class="sec">Activation funnel</div><div class="panel">'+funnel(d.funnel||{})+'</div>'
        +'</div>';
    }
    function msg(t){return '<div class="msg">'+esc(t)+'</div>';}
    (async function(){
      var app=document.getElementById('app');
      var key=new URLSearchParams(location.search).get('key');
      if(!key){app.innerHTML=msg('Add your dashboard key to the URL: ?key=…');return;}
      try{
        var res=await fetch(FN+'?key='+encodeURIComponent(key),{cache:'no-store'});
        if(res.status===401){app.innerHTML=msg('Unauthorized — the key is missing or wrong.');return;}
        if(!res.ok){app.innerHTML=msg('Could not load analytics (HTTP '+res.status+').');return;}
        var data=await res.json();
        app.innerHTML=render(data);
      }catch(err){app.innerHTML=msg('Network error loading analytics.');}
    })();
  </script>
</body>
</html>
